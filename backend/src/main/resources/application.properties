spring.application.name=backend
# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/YtAdvisor}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


# ── OAuth2 Google ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
spring.session.store-type=none

# ── App ───────────────────────────────────────────────────────────────────────
app.jwt-secret=${JWT_SECRET}
app.jwt-expiry-ms=86400000
app.python-base-url=${PYTHON_BASE_URL:${APP_PYTHON_URL:http://localhost:8000}}
app.frontend-url=${FRONTEND_URL:${APP_FRONTEND_URL:http://localhost:5173}}
app.cookie-secure=${COOKIE_SECURE:true}
app.free-limit=${FREE_LIMIT:50}
app.pro-limit=${PRO_LIMIT:100}

# ── YouTube ───────────────────────────────────────────────────────────────────
youtube.api-key=${YOUTUBE_API_KEY}
